services:
  web-drive:
    build: .
    container_name: web-drive
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SCRIPT_NAME=/web-drive
    volumes:
      - ./uploads:/app/uploads
      - ./users.db:/app/users.db
      - ./templates:/app/templates
      - ./.env:/app/.env
