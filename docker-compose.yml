services:
  web-drive:
    build: .
    container_name: web-drive
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SCRIPT_NAME=/web-drive
    command: gunicorn app:app --bind 0.0.0.0:5000 --access-logfile -
    volumes:
      - ./uploads:/web-drive/uploads
      - ./users.db:/web-drive/users.db
      - ./templates:/web-drive/templates
      - ./.env:/web-drive/.env
