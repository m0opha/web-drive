{% extends "base.html" %}
{% block titulo %}Dashboard{% endblock %}
{% block estilos %}
<style>
.welcome-card {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}
.welcome-card h2 {
  font-weight: 700;
  font-size: 1.8rem;
}
.upload-card {
  border-color: #667eea !important;
  background-color: #f8f9ff;
}
.upload-card .input-group {
  gap: 10px;
}
.file-item {
  transition: all 0.3s ease;
}
.file-item:hover {
  background-color: #f0f1ff !important;
  box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
  transform: translateX(4px);
}
.file-name {
  font-weight: 500;
  word-break: break-word;
}
@media (max-width: 576px) {
  .file-item {
    flex-direction: column;
    align-items: flex-start !important;
  }
  .file-actions {
    width: 100%;
    margin-top: 0.75rem;
  }
  .file-actions form {
    flex: 1;
  }
  .file-actions .btn {
    width: 100%;
  }
}
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row">
    <div class="col-md-8 mx-auto">

      <!-- Welcome Card -->
      <div class="card border-0 shadow-sm mb-4 welcome-card">
        <div class="card-body">
          <h2 class="mb-0">Welcome {{username}} 👋!</h2>
        </div>
      </div>

      <!-- Upload Section -->
      <div class="card border-2 mb-4 upload-card">
        <div class="card-body">
          <h5 class="card-title mb-3">Upload Files</h5>
          <form action="{{ url_for('upload_file') }}" method="post" enctype="multipart/form-data" id="uploadForm">
            <div class="input-group mb-3">
              <input type="file" name="files" id="fileInput" class="form-control" multiple required>
              <button class="btn btn-primary" type="submit">
                <i class="fas fa-upload"></i> Upload
              </button>
            </div>
            <div id="filesPreview"></div>
          </form>
        </div>
      </div>

      <!-- Files List -->
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h5 class="card-title mb-4">Uploaded Files</h5>
          
          {% if files %}
            <div class="files-list">
          
              {% for file in files %}
              <div class="file-item d-flex justify-content-between align-items-center p-3 bg-light rounded-2 mb-2 border-start border-4 border-primary">
                <div class="file-info d-flex align-items-center gap-3 flex-grow-1">
                  <i class="fas fa-file text-primary fs-5"></i>
                  <span class="file-name text-dark">{{ file }}</span>
                </div>
          
                <div class="file-actions d-flex gap-2">

                  <form action="{{ url_for('see_file', filename=file) }}" method="get" class="m-0"
                        onsubmit="event.preventDefault(); viewFile('{{ file }}', this.action)">
                      <button type="submit" class="btn btn-sm btn-info text-white" title="View">
                          <i class="fas fa-eye"></i>
                      </button>
                  </form>

                  <form action="{{ url_for('download_file', filename=file) }}" method="get" class="m-0">
                      <button type="submit" class="btn btn-sm btn-success" title="Download">
                          <i class="fas fa-download"></i>
                      </button>
                  </form>

                  <form action="{{ url_for('delete_file', filename=file) }}" method="post" class="m-0">
                      <button type="submit" class="btn btn-sm btn-danger"
                              onclick="return confirm('Delete file?')" title="Delete">
                          <i class="fas fa-trash"></i>
                      </button>
                  </form>      
                </div>
          
              </div>
              {% endfor %}

            </div>
          
            {% else %}
            <div class="text-center py-5">
              <i class="fas fa-inbox text-muted" style="font-size: 2rem;"></i>
              <p class="text-muted mt-3">No files yet</p>
            </div>
          {% endif %}

        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="modalVisor" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="modalName"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body p-0">

                <div id="viewerImage" style="display:none;text-align:center;padding:1rem;">
                    <img id="modalImage" style="max-width:100%;max-height:75vh;">
                </div>

                <div id="viewerPdf" style="display:none;">
                    <iframe id="modalPdf" style="width:100%;height:75vh;border:none;"></iframe>
                </div>

                <div id="viewerVideo" style="display:none;text-align:center;padding:1rem;">
                    <video id="modalVideo" controls style="max-width:100%;max-height:75vh;"></video>
                </div>

                <div id="viewerAudio" style="display:none;padding:2rem;">
                    <audio id="modalAudio" controls style="width:100%;"></audio>
                </div>

                <div id="viewerText" style="display:none;">
                    <textarea id="modalContent" style="width:100%;min-height:500px;padding:1rem;border:none;resize:vertical;background:#1e1e1e;color:#d4d4d4;font-family:monospace;"></textarea>
                </div>

                <div id="viewerLoading" style="padding:2rem;text-align:center;">
                    <div class="spinner-border"></div>
                </div>

            </div>

            <div class="modal-footer">
                <small id="modalInfo" class="text-muted me-auto"></small>
                <button id="btnSave" type="button" class="btn btn-primary" style="display:none" onclick="saveFile()">Save</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>

        </div>
    </div>
</div>

<script>
let currentFile = null;

function hideViewers() {
    ['viewerImage','viewerPdf','viewerVideo','viewerAudio','viewerText','viewerLoading'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
    });
}

async function viewFile(nombre, url) {
    currentFile = nombre;
    document.getElementById('modalName').textContent = nombre;
    document.getElementById('modalInfo').textContent = '';
    document.getElementById('btnSave').style.display = 'none';
    hideViewers();
    document.getElementById('viewerLoading').style.display = 'block';
    new bootstrap.Modal(document.getElementById('modalVisor')).show();

    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const mimeType = (res.headers.get('Content-Type') || '').split(';')[0].trim();

        if (mimeType.startsWith('image/')) {
            const blob = await res.blob();
            document.getElementById('modalImage').src = URL.createObjectURL(blob);
            hideViewers();
            document.getElementById('viewerImage').style.display = 'block';
            return;
        }
        if (mimeType === 'application/pdf') {
            const blob = await res.blob();
            document.getElementById('modalPdf').src = URL.createObjectURL(blob);
            hideViewers();
            document.getElementById('viewerPdf').style.display = 'block';
            return;
        }
        if (mimeType.startsWith('video/')) {
            const blob = await res.blob();
            document.getElementById('modalVideo').src = URL.createObjectURL(blob);
            hideViewers();
            document.getElementById('viewerVideo').style.display = 'block';
            return;
        }
        if (mimeType.startsWith('audio/')) {
            const blob = await res.blob();
            document.getElementById('modalAudio').src = URL.createObjectURL(blob);
            hideViewers();
            document.getElementById('viewerAudio').style.display = 'block';
            return;
        }
        if (mimeType.startsWith('text/') || mimeType.includes('json') || mimeType.includes('xml') || mimeType.includes('javascript')) {
            const texto = await res.text();
            document.getElementById('modalContent').value = texto;
            hideViewers();
            document.getElementById('viewerText').style.display = 'block';
            document.getElementById('btnSave').style.display = 'inline-block';
            return;
        }

        hideViewers();
        document.getElementById('viewerText').style.display = 'block';
        document.getElementById('modalContent').value = `Preview not available\n\nMIME type: ${mimeType}`;
    }
    catch (e) {
        hideViewers();
        document.getElementById('viewerText').style.display = 'block';
        document.getElementById('modalContent').value = `⚠ ${e.message}`;
    }
}

async function saveFile() {
    const contenido = document.getElementById('modalContent').value;
    try {
        const url = "{{ url_for('edit_file', filename='__FILE__') }}".replace('__FILE__', encodeURIComponent(currentFile));
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: contenido
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        document.getElementById('modalInfo').textContent = '✓ Saved successfully';
    }
    catch (e) {
        document.getElementById('modalInfo').textContent = '⚠ ' + e.message;
    }
}
</script>
{% endblock %}
